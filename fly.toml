# fly.toml app configuration file generated for nexgen-confusion-detection
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "nexgen-confusion-detection"
primary_region = "sjc"

[env]
  PYTHONUNBUFFERED = "1"

[build]
  builder = "paketobuildpacks/builder:base"

[[services]]
  protocol = "tcp"
  internal_port = 5000
  processes = ["app"]

  [services.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 100

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.http_checks]
    enabled = true
    interval = 10000
    timeout = 5000
    grace_period = "5s"
    method = "get"
    path = "/"
